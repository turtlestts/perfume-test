<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 선택 테스트</title>
    <style>
        /* 기본 배경 설정 (컴퓨터/태블릿/가로 모드) */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
            /* 이미지 배경 설정 */
            background-image: url('images/bg.jpg'); /* 제공된 이미지 파일 주소 */
            background-size: cover;          /* 화면 전체를 꽉 채우도록 크기 조절 */
            background-position: center;     /* 배경 이미지를 정중앙에 위치 */
            background-repeat: no-repeat;    /* 이미지가 바둑판식으로 반복되지 않게 설정 */
            background-attachment: fixed;     /* 스크롤 시 배경 이미지는 고정되도록 설정 */
        }

        /* 중앙 흰색 컨테이너 박스 */
        .container {
            background-color: rgba(255, 255, 255, 0.93); /* 흰색 배경에 93% 불투명도 적용 */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 400px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box; /* 패딩이 박스 크기를 벗어나지 않게 고정 */
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .keyword {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50; /* 어두운 남색으로 가독성 개선 */
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s; /* 클릭 효과 추가 */
        }
        
        button:active { transform: scale(0.98); } /* 클릭 시 살짝 작아지는 효과 */

        /* 버튼 색상 */
        .btn-yes { background-color: #2ecc71; color: white; }
        .btn-yes:hover { background-color: #27ae60; }

        .btn-no { background-color: #e74c3c; color: white; }
        .btn-no:hover { background-color: #c0392b; }

        /* 다시하기 버튼 스타일 */
        .btn-retry {
            background-color: #34495e; /* 어두운 남색으로 변경 */
            color: white;
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            font-size: 16px;
        }
        .btn-retry:hover { background-color: #2c3e50; }

        /* 결과 화면 스타일 */
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .result-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .result-item span {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .hidden {
            display: none !important;
        }

        /* 📱 모바일 화면 (세로가 긴 스마트폰 화면) 최적화 스타일 추가 */
        @media (max-width: 480px) {
            body {
                /* 모바일 화면에서는 인물이 조금 더 잘 보이도록 배경 중심축을 오른쪽(right)이나 살짝 조정 가능 */
                background-position: 65% center; 
                /* iOS 등 일부 모바일 브라우저에서 배경 튕김/밀림 현상을 방지하기 위해 scroll로 변경 */
                background-attachment: scroll; 
            }

            .container {
                width: 90%; /* 폰 화면 좌우에 꽉 차기 위해 비율로 설정 */
                padding: 20px;
                min-height: 280px;
            }

            h1 {
                font-size: 20px; /* 모바일 전용 글씨 크기 축소 */
            }

            .keyword {
                font-size: 26px; /* 모바일 전용 글씨 크기 축소 */
            }

            button {
                padding: 10px 24px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-screen">
            <h1>당신의 이상향은? (<span id="progress">1</span>/5)</h1>
            <div class="keyword" id="keyword-display">키워드</div>
            <div class="btn-group">
                <button class="btn-yes" onclick="handleChoice(true)">예</button>
                <button class="btn-no" onclick="handleChoice(false)">아니오</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h1>내가 '예'를 선택한 키워드</h1>
            <div id="result-list"></div>
            <button class="btn-retry" onclick="resetQuiz()">다시하기</button>
        </div>
    </div>

    <script>
        const data = [
            { keyword: "차분함, 고요함", image: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=300" },
            { keyword: "바닷바람", image: "https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=300" },
            { keyword: "헤이즐넛 커피", image: "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?w=300" },
            { keyword: "베이비 파우더", image: "https://images.unsplash.com/photo-1556228720-195a672e8a03?w=300" },
            { keyword: "소나무 숲길", image: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=300" }
        ];

        let currentIndex = 0;
        let selectedKeywords = []; 

        function updateScreen() {
            if (currentIndex < data.length) {
                document.getElementById("progress").innerText = currentIndex + 1;
                document.getElementById("keyword-display").innerText = data[currentIndex].keyword;
            } else {
                showResults();
            }
        }

        function handleChoice(isYes) {
            if (isYes) {
                selectedKeywords.push(data[currentIndex]);
            }
            currentIndex++;
            updateScreen();
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");

            const resultList = document.getElementById("result-list");
            resultList.innerHTML = ""; 
            
            if (selectedKeywords.length === 0) {
                resultList.innerHTML = "<p style='color:#777;'>선택한 키워드가 없습니다.</p>";
                return;
            }

            selectedKeywords.forEach(item => {
                const div = document.createElement("div");
                div.className = "result-item";
                div.innerHTML = `
                    <span>${item.keyword}</span>
                    <img src="${item.image}" alt="${item.keyword}">
                `;
                resultList.appendChild(div);
            });
        }

        function resetQuiz() {
            currentIndex = 0;
            selectedKeywords = [];
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            updateScreen();
        }

        updateScreen();
    </script>
</body>
</html>
