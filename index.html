<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 선택 테스트</title>
    <style>
        /* 기본 배경 설정 (컴퓨터/태블릿/가로 모드) */
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
            /* 이미지 배경 설정 (index.html과 같은 위치에 있을 때) */
            background-image: url('bg.png'); 
            background-size: cover;          /* 화면 전체를 꽉 채우도록 크기 조절 */
            background-position: center;     /* 배경 이미지를 정중앙에 위치 */
            background-repeat: no-repeat;    /* 이미지가 바둑판식으로 반복되지 않게 설정 */
            background-attachment: fixed;     /* 스크롤 시 배경 이미지는 고정되도록 설정 */
        }

        /* 중앙 흰색 컨테이너 박스 */
        .container {
            background-color: rgba(255, 255, 255, 0.93); /* 흰색 배경에 93% 불투명도 적용 */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 440px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box; /* 패딩이 박스 크기를 벗어나지 않게 고정 */
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .keyword {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50; /* 어두운 남색으로 가독성 개선 */
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s; /* 클릭 효과 추가 */
        }
        
        button:active { transform: scale(0.98); } /* 클릭 시 살짝 작아지는 효과 */

        /* 버튼 색상 */
        .btn-yes { background-color: #2ecc71; color: white; }
        .btn-yes:hover { background-color: #27ae60; }

        .btn-no { background-color: #e74c3c; color: white; }
        .btn-no:hover { background-color: #c0392b; }

        /* 다시하기 버튼 스타일 */
        .btn-retry {
            background-color: #34495e; /* 어두운 남색으로 변경 */
            color: white;
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            font-size: 16px;
        }
        .btn-retry:hover { background-color: #2c3e50; }

        /* 결과 화면 스타일 */
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        .result-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .result-info .kv {
            font-size: 14px;
            color: #7f8c8d;
        }

        .result-info .pf {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        .result-info .pf span {
            color: #e67e22; /* 향수 이름 오렌지색 강조 */
        }

        .result-item img {
            width: 65px;
            height: 65px;
            border-radius: 8px;
            object-fit: cover;
        }

        .hidden {
            display: none !important;
        }

        /* 📱 모바일 화면 (세로가 긴 스마트폰 화면) 최적화 스타일 추가 */
        @media (max-width: 480px) {
            body {
                background-position: 65% center; /* 모바일 화면에서 인물이 잘 보이도록 세팅 */
                background-attachment: scroll; /* 모바일 브라우저 튕김 현상 방지 */
            }

            .container {
                width: 92%; /* 폰 화면 좌우에 꽉 차기 위해 비율로 설정 */
                padding: 20px;
                min-height: 280px;
            }

            h1 { font-size: 20px; }
            .keyword { font-size: 26px; }
            button { padding: 10px 24px; font-size: 16px; }
            .result-info .pf { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-screen">
            <h1>당신의 이상향은? (<span id="progress">1</span>/5)</h1>
            <div class="keyword" id="keyword-display">키워드</div>
            <div class="btn-group">
                <button class="btn-yes" onclick="handleChoice(true)">예</button>
                <button class="btn-no" onclick="handleChoice(false)">아니오</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h1>나에게 어울리는 강릉 향수</h1>
            <div id="result-list"></div>
            <button class="btn-retry" onclick="resetQuiz()">다시하기</button>
        </div>
    </div>

    <script>
        // 키워드별 추천 향수 매칭 데이터 설정
        const data = [
            { 
                keyword: "차분함, 고요함", 
                perfume: "하슬라", 
                image: "haslla.png" 
            },
            { 
                keyword: "바닷바람", 
                perfume: "경포", 
                image: "gyeongpo.png" 
            },
            { 
                keyword: "헤이즐넛 커피", 
                perfume: "안목", 
                image: "anmok.png" 
            },
            { 
                keyword: "베이비 파우더", 
                perfume: "초당", 
                image: "chodang.png" 
            },
            { 
                keyword: "소나무 숲길", 
                perfume: "강문", 
                image: "gangmun.png" 
            }
        ];

        let currentIndex = 0;
        let selectedKeywords = []; 

        function updateScreen() {
            if (currentIndex < data.length) {
                document.getElementById("progress").innerText = currentIndex + 1;
                document.getElementById("keyword-display").innerText = data[currentIndex].keyword;
            } else {
                showResults();
            }
        }

        function handleChoice(isYes) {
            if (isYes) {
                selectedKeywords.push(data[currentIndex]);
            }
            currentIndex++;
            updateScreen();
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");

            const resultList = document.getElementById("result-list");
            resultList.innerHTML = ""; 
            
            if (selectedKeywords.length === 0) {
                resultList.innerHTML = "<p style='color:#777; margin: 30px 0;'>선택한 키워드가 없습니다.<br>다시 테스트해보세요!</p>";
                return;
            }

            selectedKeywords.forEach(item => {
                const div = document.createElement("div");
                div.className = "result-item";
                div.innerHTML = `
                    <div class="result-info">
                        <span class="kv">선택 키워드: ${item.keyword}</span>
                        <span class="pf">추천 향수: <span>'${item.perfume}'</span></span>
                    </div>
                    <img src="${item.image}" alt="${item.keyword}">
                `;
                resultList.appendChild(div);
            });
        }

        function resetQuiz() {
            currentIndex = 0;
            selectedKeywords = [];
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");
            updateScreen();
        }

        updateScreen();
    </script>
</body>
</html>
