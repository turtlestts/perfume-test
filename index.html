<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드 선택 테스트</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .keyword {
            font-size: 32px;
            font-weight: bold;
            color: #4a90e2;
            margin: 20px 0;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-yes { background-color: #2ecc71; color: white; }
        .btn-yes:hover { background-color: #27ae60; }

        .btn-no { background-color: #e74c3c; color: white; }
        .btn-no:hover { background-color: #c0392b; }

        /* 다시하기 버튼 스타일 */
        .btn-retry {
            background-color: #7f8c8d;
            color: white;
            width: 100%;
            margin-top: 25px;
            padding: 12px;
            font-size: 16px;
        }
        .btn-retry:hover { background-color: #95a5a6; }

        /* 결과 화면 스타일 */
        .result-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .result-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .result-item span {
            font-size: 18px;
            font-weight: bold;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-screen">
            <h1>당신의 이상향은? (<span id="progress">1</span>/5)</h1>
            <div class="keyword" id="keyword-display">키워드</div>
            <div class="btn-group">
                <button class="btn-yes" onclick="handleChoice(true)">예</button>
                <button class="btn-no" onclick="handleChoice(false)">아니오</button>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h1>내가 '예'를 선택한 키워드</h1>
            <div id="result-list"></div>
            <button class="btn-retry" onclick="resetQuiz()">다시하기</button>
        </div>
    </div>

    <script>
        const data = [
            { keyword: "사과", image: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=150" },
            { keyword: "강아지", image: "https://images.unsplash.com/photo-1543466835-00a7907e9de1?w=150" },
            { keyword: "바다", image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=150" },
            { keyword: "커피", image: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=150" },
            { keyword: "책", image: "https://images.unsplash.com/photo-1495640388908-05fa85288e61?w=150" }
        ];

        let currentIndex = 0;
        // const 대신 언제든 비울 수 있도록 let으로 변경
        let selectedKeywords = []; 

        function updateScreen() {
            if (currentIndex < data.length) {
                document.getElementById("progress").innerText = currentIndex + 1;
                document.getElementById("keyword-display").innerText = data[currentIndex].keyword;
            } else {
                showResults();
            }
        }

        function handleChoice(isYes) {
            if (isYes) {
                selectedKeywords.push(data[currentIndex]);
            }
            currentIndex++;
            updateScreen();
        }

        function showResults() {
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("result-screen").classList.remove("hidden");

            const resultList = document.getElementById("result-list");
            // 다시하기를 누른 후 재진입했을 때 기존 결과가 누적되지 않도록 비워줌
            resultList.innerHTML = ""; 
            
            if (selectedKeywords.length === 0) {
                resultList.innerHTML = "<p style='color:#777;'>선택한 키워드가 없습니다.</p>";
                return;
            }

            selectedKeywords.forEach(item => {
                const div = document.createElement("div");
                div.className = "result-item";
                div.innerHTML = `
                    <span>${item.keyword}</span>
                    <img src="${item.image}" alt="${item.keyword}">
                `;
                resultList.appendChild(div);
            });
        }

        // 새롭게 추가된 초기화 함수
        function resetQuiz() {
            // 변수 초기화
            currentIndex = 0;
            selectedKeywords = [];

            // 화면 전환 (결과 숨기고 질문 보여주기)
            document.getElementById("result-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.remove("hidden");

            // 첫 번째 키워드로 다시 세팅
            updateScreen();
        }

        // 첫 페이지 초기화 실행
        updateScreen();
    </script>
</body>
</html>
